chapter3_root: /media/ana-4090/LY/chapter3
detector_cfg_file: /media/ana-4090/LY/chapter3/tools/cfgs/custom_models/voxelnext_v2x_seq_lidar.yaml
detector_ckpt: /media/ana-4090/LY/chapter3/output/cfgs/custom_models/voxelnext_v2x_seq_lidar/default/ckpt/checkpoint_epoch_30.pth

dataset:
  name: v2x_seq
  split: train
  info_paths:
    v2x_seq:
      train: /media/ana-4090/LY/chapter3/data/v2x_seq/tracking_infos_train.pkl
      val: /media/ana-4090/LY/chapter3/data/v2x_seq/tracking_infos_val.pkl
  K: 3
  stride: 1
  max_objects: 64
  class_names: [Car]
  box_center_range: [0.0, -40.0, -5.0, 140.0, 40.0, 10.5]
  box_size_scale: [10.0, 10.0, 5.0]
  box_yaw_scale: 3.141592653589793

detection_cache:
  root: outputs/nova_qwen05b_seq_v2_lifecycle/detection_cache
  paths: {}
  score_thresh: 0.05
  max_dets_per_frame: 100
  class_name: Car

nova:
  history_len: 3
  history_stride: 1
  det_gt_iou_threshold: 0.5
  association_threshold: 0.5
  max_lost_frames: 2
  runtime_batch_size: 32
  geometry_hidden_size: 128
  negative_positive_ratio: 3.0
  box_token: <box>
  yes_token: "Yes"
  no_token: "No"
  birth_token: "Birth"
  suppress_token: "Suppress"
  keep_token: "Keep"
  end_token: "End"
  use_lora: true
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules: [q_proj, v_proj]

model:
  use_mock_visual: false
  use_mock_llm: false
  visual_dim: 128
  qformer_hidden_size: 128
  num_attention_heads: 4
  llm_hidden_size: 0
  mock_llm_hidden_size: 128
  mock_llm_layers: 2
  llm_model_name_or_path: /media/ana-4090/LY/LLM_models/Qwen2.5-0.5B
  llm_torch_dtype: float16
  llm_trust_remote_code: true
  llm_low_cpu_mem_usage: true
  llm_attn_implementation: ""
  freeze_llm: true

loss:
  lambda_quality: 1.0

train:
  batch_size: 8
  num_workers: 0
  lr: 0.0001
  epochs: 10
  max_iters: 0
  log_interval: 1
  eval_interval_epochs: 3
  save_interval_epochs: 3
  eval_on_final: true
  eval_max_frames: 0
  best_metric: mota
  best_mode: max
  save_trainable_only: true
  resume: ""

eval:
  batch_size: 1
  max_lost_frames: 2
  score_thresh: 0.3
  checkpoint: ""

evaluator:
  enabled: true
  iou_threshold: 0.5
  metrics_path: outputs/nova_qwen05b_seq_v2_lifecycle/tracking_metrics.json

output_dir: outputs/nova_qwen05b_seq_v2_lifecycle
