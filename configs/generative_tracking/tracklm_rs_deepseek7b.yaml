chapter3_root: /media/ana-4090/LY/chapter3
detector_cfg_file: /media/ana-4090/LY/chapter3/tools/cfgs/exp46/4-10_A7_mths.yaml
detector_ckpt: ""

dataset:
  name: xian
  split: train
  K: 3
  stride: 1
  max_objects: 64
  class_names: [Car, Pedestrian, Cyclist, Truck, Bus]
  box_center_range: [0.0, -20.0, -4.5, 120.0, 30.0, 10.5]
  box_size_scale: [10.0, 10.0, 5.0]
  box_yaw_scale: 3.141592653589793

model:
  use_mock_visual: true
  use_mock_llm: false
  feature_source: gt_boxes
  detector_mode: cache
  visual_dim: 128
  detector_token_dim: 128
  max_detector_tokens: 256
  online_detector_batch_size: 1
  online_detector_workers: 0
  qformer_hidden_size: 128
  num_queries: 16
  num_attention_heads: 4
  num_track_queries: 64
  track_embed_dim: 128
  llm_hidden_size: 0
  llm_model_name_or_path: /media/ana-4090/LY/LLM_models/deepseek-llm-7b-base
  llm_torch_dtype: float16
  llm_trust_remote_code: true
  llm_low_cpu_mem_usage: true
  llm_attn_implementation: ""
  freeze_detector: true
  freeze_llm: true

prompt:
  enabled: true
  max_length: 128
  template: "Sequence {sequence_id}, frame {frame_id}. Generate the current 3D track set with object boxes, classes, and temporally consistent identities."

loss:
  compute_det_loss: false
  lambda_cls: 1.0
  lambda_center: 2.0
  lambda_size: 1.0
  lambda_yaw: 1.0
  lambda_embed: 1.0
  no_object_weight: 0.1
  matching_cls_cost: 1.0
  matching_center_cost: 2.0
  matching_size_cost: 1.0
  matching_yaw_cost: 1.0
  ignore_index: -1

train:
  batch_size: 1
  num_workers: 0
  lr: 0.001
  max_iters: 100
  log_interval: 1

eval:
  batch_size: 1
  max_lost_frames: 2
  score_default: 1.0
  score_thresh: 0.3
  embedding_match_threshold: 0.5

evaluator:
  enabled: true
  iou_threshold: 0.5
  metrics_path: outputs/tracklm_rs/tracking_metrics.json

output_dir: outputs/tracklm_rs_deepseek7b
