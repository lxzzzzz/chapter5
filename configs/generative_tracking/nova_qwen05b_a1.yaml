chapter3_root: /media/ana-4090/LY/chapter3
detector_cfg_file: /media/ana-4090/LY/chapter3/tools/cfgs/exp46/4-10_A1_mths.yaml
detector_ckpt: /media/ana-4090/LY/chapter3/output/cfgs/exp46/4-10_A1_mths/exp46/4-10/A1/ckpt/checkpoint_epoch_2.pth

dataset:
  name: xian
  split: train
  K: 3
  stride: 1
  max_objects: 64
  class_names: [Car]
  box_center_range: [0.0, -20.0, -4.5, 120.0, 30.0, 10.5]
  box_size_scale: [10.0, 10.0, 5.0]
  box_yaw_scale: 3.141592653589793

detection_cache:
  root: outputs/nova_qwen05b_a1/detection_cache
  paths: {}
  score_thresh: 0.05
  max_dets_per_frame: 100
  class_name: Car

nova:
  history_len: 3
  history_stride: 1
  det_gt_iou_threshold: 0.5
  association_threshold: 0.5
  max_lost_frames: 2
  geometry_hidden_size: 128
  negative_positive_ratio: 3.0
  output_score_mode: detector
  box_token: <box>
  yes_token: "Yes"
  no_token: "No"
  use_lora: true
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules: [q_proj, v_proj]

model:
  use_mock_visual: false
  use_mock_llm: false
  visual_dim: 128
  qformer_hidden_size: 128
  num_attention_heads: 4
  llm_hidden_size: 0
  mock_llm_hidden_size: 128
  mock_llm_layers: 2
  llm_model_name_or_path: /media/ana-4090/LY/LLM_models/Qwen2.5-0.5B
  llm_torch_dtype: float16
  llm_trust_remote_code: true
  llm_low_cpu_mem_usage: true
  llm_attn_implementation: ""
  freeze_llm: true

loss:
  lambda_quality: 1.0

train:
  batch_size: 8
  num_workers: 0
  lr: 0.0001
  epochs: 10
  max_iters: 0
  log_interval: 1
  eval_interval_epochs: 3
  save_interval_epochs: 3
  eval_on_final: true
  eval_max_frames: 0
  best_metric: mota
  best_mode: max
  save_trainable_only: true
  resume: ""

eval:
  batch_size: 1
  max_lost_frames: 2
  score_thresh: 0.3
  checkpoint: ""

evaluator:
  enabled: true
  iou_threshold: 0.5
  metrics_path: outputs/nova_qwen05b_a1/tracking_metrics.json

output_dir: outputs/nova_qwen05b_a1
