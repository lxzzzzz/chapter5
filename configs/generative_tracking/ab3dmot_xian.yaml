chapter3_root: /media/ana-4090/LY/chapter3
detector_cfg_file: /media/ana-4090/LY/chapter3/tools/cfgs/dair_v2x_models/voxelnext_v2x_xian_lidar.yaml
detector_ckpt: /media/ana-4090/LY/chapter3/output/cfgs/dair_v2x_models/voxelnext_v2x_xian_lidar/default/ckpt/checkpoint_epoch_10.pth

dataset:
  name: xian
  split: train
  class_names: [Car]

detection_cache:
  root: outputs/ab3dmot_xian/detection_cache
  paths: {}
  score_thresh: 0.05
  max_dets_per_frame: 100
